<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Smart AI Attendance</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="login-card">
    <h2>Smart Attendance</h2>
    <p style="margin-bottom: 2rem;">Sign in to access your portal</p>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash-messages">
          {% for message in messages %}
            <div class="flash-message info">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label for="role">Select Your Role</label>
        <select name="role" id="role" required>
          <option value="admin">Admin / Coordinator</option>
          <option value="student">Student</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="username">Username / Identifier</label>
        <input type="text" name="username" id="username" placeholder="Email or Roll No" required autocomplete="username">
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      
      <button type="submit" style="margin-top: 0.75rem;">Login Securely</button>
    </form>
  </div>
</body>
</html>
